  url: "https://doi.org/10.3390/jcm13216486"
  abstract: "Objectives: To evaluate the correlation between radiomic features extracted from contrast-enhanced mammography (CEM) tumor lesions and peritumoral background with prognostic factors in breast cancer (BC). Methods: In this retrospective, single-center study, 134 women with histologically confirmed breast cancer underwent CEM examination. Radiomic features were extracted from manually segmented lesions and lesion contours were automatically delineated using PyRadiomics. The extracted features were categorized into seven classes: First-order Features, Shape Features (2D), Gray Level Co-occurrence Matrix (GLCM), Gray Level Run Length Matrix (GLRLM), Gray Level Size Zone Matrix (GLSZM), and Neighboring Gray Tone Difference Matrix (NGTDM). Histological examination assessed tumor type, grade, receptor structure (ER, PgR, HER2), Ki67 index, and lymph node involvement. Pearson correlation and multivariate regression were applied to evaluate associations between radiomic features and prognostic factors. Results: Significant correlations were found between First-order Features and prognostic factors such as ER, PgR, and Ki67 (p"
