  website: ""
  url: "https://doi.org/10.1016/j.media.2021.102216"
  abstract: "Recent epidemiological data report that worldwide more than 53 million people have been infected by SARS-CoV-2, resulting in 1.3 million deaths. The disease has been spreading very rapidly and few months after the identification of the first infected, shortage of hospital resources quickly became a problem. In this work we investigate whether artificial intelligence working with chest X-ray (CXR) scans and clinical data can be used as a possible tool for the early identification of patients at risk of severe outcome, like intensive care or death. Indeed, further to induce lower radiation dose than computed tomography (CT), CXR is a simpler and faster radiological technique, being also more widespread. In this respect, we present three approaches that use features extracted from CXR images, either handcrafted or automatically learnt by convolutional neuronal networks, which are then integrated with the clinical data. As a further contribution, this work introduces a repository that collects data from 820 patients enrolled in six Italian hospitals in spring 2020 during the first COVID-19 emergency. The dataset includes CXR images, several clinical attributes and clinical outcomes. Exhaustive evaluation shows promising performance both in 10-fold and leave-one-centre-out cross-validation, suggesting that clinical data and images have the potential to provide useful information for the management of patients and hospital resources."
  keywords: "COVID-19; medical imaging; clinical prediction"
  projects: "covid-prognosis-platform"
- key: "santucci2021theimpact"
  title: "The Impact of Tumor Edema on T2-Weighted 3T-MRI Invasive Breast Cancer Histological Characterization: A Pilot Radiomics Study"
  author: "Domiziana Santucci and Eliodoro Faiella and Ermanno Cordelli and Alessandro Calabrese and Roberta Landi and Carlo de Felice and Bruno Beomonte Zobel and Rosario Francesco Grasso and Giulio Iannello and Paolo Soda"
  venue: "Cancers"
  year: "2021"
  doi: "10.3390/cancers13184635"
  doi_url: "https://doi.org/10.3390/cancers13184635"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/cancers13184635"
  abstract: "Background: to evaluate the contribution of edema associated with histological features to the prediction of breast cancer (BC) prognosis using T2-weighted MRI radiomics. Methods: 160 patients who underwent staging 3T-MRI from January 2015 to January 2019, with 164 histologically proven invasive BC lesions, were retrospectively reviewed. Patient data (age, menopausal status, family history, hormone therapy), tumor MRI-features (location, margins, enhancement) and histological features (histological type, grading, ER, PgR, HER2, Ki-67 index) were collected. Of the 160 MRI exams, 120 were considered eligible, corresponding to 127 lesions. T2-MRI were used to identify edema, which was classified in four groups: peritumoral, pre-pectoral, subcutaneous, or diffuse. A semi-automatic segmentation of the edema was performed for each lesion, using 3D Slicer open-source software. Main radiomics features were extracted and selected using a wrapper selection method. A Random Forest type classifier was trained to measure the performance of predicting histological factors using semantic features (patient data and MRI features) alone and semantic features associated with edema radiomics features. Results: edema was absent in 37 lesions and present in 127 (62 peritumoral, 26 pre-pectoral, 16 subcutaneous, 23 diffuse). The AUC-classifier obtained by associating edema radiomics with semantic features was always higher compared to the AUC-classifier obtained from semantic features alone, for all five histological classes prediction (0.645 vs. 0.520 for histological type, 0.789 vs. 0.590 for grading, 0.487 vs. 0.466 for ER, 0.659 vs. 0.546 for PgR, and 0.62 vs. 0.573 for Ki67). Conclusions: radiomic features extracted from tumor edema contribute significantly to predicting tumor histology, increasing the accuracy obtained from the combination of patient clinical characteristics and breast imaging data."
  keywords: "radiomics; oncology; medical imaging"
  projects: ""
- key: "guarrasi2021amulti"
  title: "A Multi-Expert System to Detect COVID-19 Cases in X-ray Images"
  author: "Valerio Guarrasi and Natascha Claudia D'Amico and Rosa Sicilia and Ermanno Cordelli and Paolo Soda"
  venue: "2021 IEEE 34th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2021"
  doi: "10.1109/CBMS52027.2021.00090"
  doi_url: "https://doi.org/10.1109/CBMS52027.2021.00090"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/CBMS52027.2021.00090"
  abstract: "The year 2020 was marked by the worldwide COVID-19 pandemic, which caused over 2.5 million deaths by the end of February 2021. Different methods have been established since the beginning to identify infected patients and restrict the spread of the virus. In addition to laboratory analysis, used as the gold standard, several applications have been developed to apply deep learning algorithms to chest X-ray (CXR) images to diagnose patients affected by COVID-19. The literature shows that convolutional neural networks (CNNs) perform well on a single image dataset, but fail to generalize to other sources of data. To overcome this limitation, we present a late fusion approach in which multiple CNNs collaborate to diagnose the CXR scan of a patient, improving the generalizability. Experiments on three datasets publicly available show that the ensemble of CNNs outperforms stand-alone networks, achieving promising performance not only in cross-validation, but also when external validation is used, with an average accuracy of 95.18%."
  keywords: "COVID-19; medical imaging; multimodal learning"
