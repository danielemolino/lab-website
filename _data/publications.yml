- key: "prata2023radiomicmachine"
  title: "Radiomic Machine-Learning Analysis of Multiparametric Magnetic Resonance Imaging in the Diagnosis of Clinically Significant Prostate Cancer: New Combination of Textural and Clinical Features"
  author: "Francesco Prata and Umberto Anceschi and Ermanno Cordelli and Eliodoro Faiella and Angelo Civitella and P. Tuzzolo and Andrea Iannuzzi and Alberto Ragusa and Francesco Esperto and Salvatore Mario Prata and Rosa Sicilia and Giovanni Muto and Rosario Francesco Grasso and Roberto Mario Scarpa and Paolo Soda and Giuseppe Simone and Rocco Papalia"
  venue: "Current Oncology"
  year: "2023"
  doi: "10.3390/curroncol30020157"
  doi_url: "https://doi.org/10.3390/curroncol30020157"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/curroncol30020157"
  abstract: "Background: The aim of our study was to develop a radiomic tool for the prediction of clinically significant prostate cancer. Methods: From September 2020 to December 2021, 91 patients who underwent magnetic resonance imaging prostate fusion biopsy at our institution were selected. Prostate cancer aggressiveness was assessed by combining the three orthogonal planes-Llocal binary pattern the 3Dgray level co-occurrence matrix, and other first order statistical features with clinical (semantic) features. The 487 features were used to predict whether the Gleason score was clinically significant (≥7) in the final pathology. A feature selection algorithm was used to determine the most predictive features, and at the end of the process, nine features were chosen through a 10-fold cross validation. Results: The feature analysis revealed a detection accuracy of 83.5%, with a clinically significant precision of 84.4% and a clinically significant sensitivity of 91.5%. The resulting area under the curve was 80.4%. Conclusions: Radiomic analysis allowed us to develop a tool that was able to predict a Gleason score of ≥7. This new tool may improve the detection rate of clinically significant prostate cancer and overcome the limitations of the subjective interpretation of magnetic resonance imaging, reducing the number of useless biopsies."
  keywords: "radiomics; oncology; medical imaging"
  projects: ""
- key: "paolo2023namedentity"
  title: "Named Entity Recognition in Italian Lung Cancer Clinical Reports using Transformers"
  author: "Domenico Paolo and Alessandro Bria and Carlo Greco and Marco Russano and Sara Ramella and Paolo Soda and Rosa Sicilia"
  venue: "2023 IEEE International Conference on Bioinformatics and Biomedicine (BIBM)"
  year: "2023"
  doi: "10.1109/bibm58861.2023.10385778"
  doi_url: "https://doi.org/10.1109/bibm58861.2023.10385778"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/bibm58861.2023.10385778"
  url: "https://doi.org/10.1109/bibm58861.2023.10385778"
  abstract: "The widespread adoption of electronic health records (EHRs) offers a valuable opportunity to support clinical research by containing crucial patient information, including diagnoses, symptoms, medications, lab tests, and more. Despite the success of deep learning for biomedical Named Entity Recognition (NER), the literature in this field still presents a gap regarding applications focused on lung cancer for the Italian language. Hence, this paper presents a transformer-based approach to extract named entities from Italian clinical notes related to Non-Small Cell Lung Cancer (NSCLC). We introduce a novel set of 25 clinical entities related to NSCLC building a corpus annotated for NER. We apply a state-of the-art model pre-trained on Italian biomedical texts to the manually annotated clinical reports of a cohort of 257 patients suffering from NSCLC, successfully dealing with class-imbalance problems and obtaining promising performance (average F1-score of 84.3%). We also compared our method with two other pre-trained state-of-the-art models showing that the domain specific knowledge offered by the proposed approach is necessary to achieve higher performance. These findings also showcase the feasibility of using transformers to extract biomedical information in the Italian language."
  keywords: "oncology; foundation models; medical imaging"
  projects: ""
- key: "nibid2023deeppathomics"
  title: "Deep pathomics: A new image-based tool for predicting response to treatment in stage III non-small cell lung cancer"
  author: "Lorenzo Nibid and Carlo Greco and Ermanno Cordelli and Giovanna Sabarese and Michele Fiore and Charles Z. Liu and Edy Ippolito and Rosa Sicilia and M. Miele and Matteo Tortora and Chiara Taffon and Mehrdad Rakaee and Paolo Soda and Sara Ramella and Giuseppe Perrone"
  venue: "PLOS ONE"
  year: "2023"
  doi: "10.1371/journal.pone.0294259"
  doi_url: "https://doi.org/10.1371/journal.pone.0294259"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1371/journal.pone.0294259"
  abstract: "Despite the advantages offered by personalized treatments, there is presently no way to predict response to chemoradiotherapy in patients with non-small cell lung cancer (NSCLC). In this exploratory study, we investigated the application of deep learning techniques to histological tissue slides (deep pathomics), with the aim of predicting the response to therapy in stage III NSCLC. We evaluated 35 digitalized tissue slides (biopsies or surgical specimens) obtained from patients with stage IIIA or IIIB NSCLC. Patients were classified as responders (12/35, 34.7%) or non-responders (23/35, 65.7%) based on the target volume reduction shown on weekly CT scans performed during chemoradiation treatment. Digital tissue slides were tested by five pre-trained convolutional neural networks (CNNs)—AlexNet, VGG, MobileNet, GoogLeNet, and ResNet—using a leave-two patient-out cross validation approach, and we evaluated the networks’ performances. GoogLeNet was globally found to be the best CNN, correctly classifying 8/12 responders and 10/11 non-responders. Moreover, Deep-Pathomics was found to be highly specific (TNr: 90.1) and quite sensitive (TPr: 0.75). Our data showed that AI could surpass the capabilities of all presently available diagnostic systems, supplying additional information beyond that currently obtainable in clinical practice. The ability to predict a patient’s response to treatment could guide the development of new and more effective therapeutic AI-based approaches and could therefore be considered an effective and innovative step forward in personalised medicine."
  keywords: "radiomics; oncology; medical imaging"
  projects: ""
- key: "guarrasi2023multiobjective"
  title: "Multi-objective optimization determines when, which and how to fuse deep networks: An application to predict COVID-19 outcomes"
  author: "Valerio Guarrasi and Paolo Soda"
  venue: "Computers in Biology and Medicine"
  year: "2023"
  doi: "10.1016/j.compbiomed.2023.106625"
  doi_url: "https://doi.org/10.1016/j.compbiomed.2023.106625"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1016/j.compbiomed.2023.106625"
  abstract: "The COVID-19 pandemic has caused millions of cases and deaths and the AI-related scientific community, after being involved with detecting COVID-19 signs in medical images, has been now directing the efforts towards the development of methods that can predict the progression of the disease. This task is multimodal by its very nature and, recently, baseline results achieved on the publicly available AIforCOVID dataset have shown that chest X-ray scans and clinical information are useful to identify patients at risk of severe outcomes. While deep learning has shown superior performance in several medical fields, in most of the cases it considers unimodal data only. In this respect, when, which and how to fuse the different modalities is an open challenge in multimodal deep learning. To cope with these three questions here we present a novel approach optimizing the setup of a multimodal end-to-end model. It exploits Pareto multi-objective optimization working with a performance metric and the diversity score of multiple candidate unimodal neural networks to be fused. We test our method on the AIforCOVID dataset, attaining state-of-the-art results, not only outperforming the baseline performance but also being robust to external validation. Moreover, exploiting XAI algorithms we figure out a hierarchy among the modalities and we extract the features' intra-modality importance, enriching the trust on the predictions made by the model."
  keywords: "COVID-19; multimodal learning; clinical prediction"
  projects: "covid-prognosis-platform"
