- key: "aksu2024towarda"
  title: "Toward a Multimodal Deep Learning Approach for Histological Subtype Classification in NSCLC"
  author: "Fatih Aksu and Fabrizia Gelardi and Arturo Chiti and Paolo Soda"
  venue: "2024 IEEE International Conference on Bioinformatics and Biomedicine (BIBM)"
  year: "2024"
  doi: "10.1109/bibm62325.2024.10822421"
  doi_url: "https://doi.org/10.1109/bibm62325.2024.10822421"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/bibm62325.2024.10822421"
  url: "https://doi.org/10.1109/bibm62325.2024.10822421"
  abstract: "Accurate classification of non-small cell lung cancer (NSCLC) subtypes is crucial for implementing effective, personalized treatment strategies. This study introduces a novel 3D multimodal convolutional neural network (CNN) architecture for histological subtype classification of NSCLC, specifically distinguishing between lung adenocarcinoma (LUAD) and lung squamous cell carcinoma (LUSC). In the context of multimodal deep learning, our approach employs an intermediate fusion technique to integrate both PET and CT imaging modalities, leveraging the complementary information provided by each. We utilized two public datasets alongside a private one, encompassing a total of 714 patients. Our multimodal method was compared against unimodal methods using either CT or PET images alone, achieving better performance. Interestingly, we found that integrating information from multiple imaging modalities can lead to more accurate and reliable NSCLC subtype classification also in case of skewed a priori sample distributions. This non-invasive method has the potential to enhance diagnostic accuracy, improve treatment decisions, and contribute to more personalized and effective lung cancer care strategies. The source code for the implementation described in this paper is available at https://github.com/aksufatih/multimodal-histology-classification"
  keywords: "oncology; multimodal learning; medical imaging"
  projects: ""
- key: "tortora2023radiopathomicsmultimodal"
  title: "RadioPathomics: Multimodal Learning in Non-Small Cell Lung Cancer for Adaptive Radiotherapy"
  author: "Matteo Tortora and Ermanno Cordelli and Rosa Sicilia and Lorenzo Nibid and Edy Ippolito and Giuseppe Perrone and Sara Ramella and Paolo Soda"
  venue: "IEEE Access"
  year: "2023"
  doi: "10.1109/access.2023.3275126"
  doi_url: "https://doi.org/10.1109/access.2023.3275126"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/access.2023.3275126"
  abstract: "Current practice in cancer treatment collects multimodal data, such as radiology images, histopathology slides, genomics and clinical data. The importance of these data sources taken individually has fostered the recent rise of radiomics and pathomics, i.e., the extraction of quantitative features from radiology and histopathology images collected to predict clinical outcomes or guide clinical decisions using artificial intelligence algorithms. Nevertheless, how to combine them into a single multimodal framework is still an open issue. In this work, we develop a multimodal late fusion approach that combines hand-crafted features computed from radiomics, pathomics and clinical data to predict radiotherapy treatment outcomes for non-small-cell lung cancer patients. Within this context, we investigate eight different late fusion rules and two patient-wise aggregation rules leveraging the richness of information given by CT images, whole-slide scans and clinical data. The experiments in leave-one-patient-out cross-validation on an in-house cohort of 33 patients show that the proposed fusion-based multimodal paradigm, with an AUC equal to 90.9%, outperforms each unimodal approach, suggesting that data integration can advance precision medicine. The results also show that late fusion favourably compares against early fusion, another commonly used multimodal approach. As a further contribution, we explore the chance to use a deep learning framework against hand-crafted features. In our scenario characterised by different modalities and a limited amount of data, as it may happen in different areas of cancer research, the results show that the latter is still a viable and effective option for extracting relevant information with respect to the former."
  keywords: "radiomics; oncology; multimodal learning"
  projects: ""
