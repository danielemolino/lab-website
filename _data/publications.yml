  abstract: "(1) Background: The purpose of this review is to study the role of radiomics as a supporting tool in predicting bone disease status, differentiating benign from malignant bone lesions, and characterizing malignant bone lesions. (2) Methods: Two reviewers conducted the literature search independently. Thirteen articles on radiomics as a decision support tool for bone lesions were selected. The quality of the methodology was evaluated according to the radiomics quality score (RQS). (3) Results: All studies were published between 2018 and 2021 and were retrospective in design. Eleven (85%) studies were MRI-based, and two (15%) were CT-based. The sample size was"
