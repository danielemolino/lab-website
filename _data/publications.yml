- key: "gravina2024crossmodality"
  title: "Cross-Modality Calibration in Multi-Input Network for Axillary Lymph Node Metastasis Evaluation"
  author: "Michela Gravina and Domiziana Santucci and Ermanno Cordelli and Paolo Soda and Carlo Sansone"
  venue: "IEEE Transactions on Artificial Intelligence"
  year: "2024"
  doi: "10.1109/tai.2024.3397246"
  doi_url: "https://doi.org/10.1109/tai.2024.3397246"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/tai.2024.3397246"
  abstract: "The use of deep neural networks (DNNs) in medical images has enabled the development of solutions characterized by the need of leveraging information coming from multiple sources, raising the Multimodal Deep Learning. DNNs are known for their ability to provide hierarchical and high-level representations of input data. This capability has led to the introduction of methods performing data fusion at an intermediate level, preserving the distinctiveness of the heterogeneous sources in modality-specific paths, while learning the way to define an effective combination in a shared representation. However, modeling the intricate relationships between different data remains an open issue. In this paper, we aim to improve the integration of data coming from multiple sources. We introduce between layers belonging to different modality-specific paths a Transfer Module (TM) able to perform the cross-modality calibration of the extracted features, reducing the effects of the less discriminative ones. As case of study, we focus on the axillary lymph nodes metastasis evaluation in malignant breast cancer, a crucial prognostic factor, affecting patient’s survival. We propose a Multi-Input Single-Output 3D Convolutional Neural Network (CNN) that considers both images acquired with multiparametric Magnetic Resonance and clinical information. In particular, we assess the proposed methodology using four architectures, namely BasicNet and three ResNet variants, showing the improvement of the performance obtained by including the TM in the network configuration. Our results achieve up to 90% and 87% of accuracy and Area under ROC curve, respectively when the ResNet10 is considered, surpassing various fusion strategies proposed in the literature."
  keywords: "radiomics; oncology; multimodal learning"
  projects: ""
- key: "coser2024aibased"
  title: "AI-based methodologies for exoskeleton-assisted rehabilitation of the lower limb: a review"
  author: "Omar Coser and Christian Tamantini and Paolo Soda and Loredana Zollo"
  venue: "Frontiers in Robotics and AI"
  year: "2024"
  doi: "10.3389/frobt.2024.1341580"
  doi_url: "https://doi.org/10.3389/frobt.2024.1341580"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3389/frobt.2024.1341580"
  abstract: "Over the past few years, there has been a noticeable surge in efforts to design novel tools and approaches that incorporate Artificial Intelligence (AI) into rehabilitation of persons with lower-limb impairments, using robotic exoskeletons. The potential benefits include the ability to implement personalized rehabilitation therapies by leveraging AI for robot control and data analysis, facilitating personalized feedback and guidance. Despite this, there is a current lack of literature review specifically focusing on AI applications in lower-limb rehabilitative robotics. To address this gap, our work aims at performing a review of 37 peer-reviewed papers. This review categorizes selected papers based on robotic application scenarios or AI methodologies. Additionally, it uniquely contributes by providing a detailed summary of input features, AI model performance, enrolled populations, exoskeletal systems used in the validation process, and specific tasks for each paper. The innovative aspect lies in offering a clear understanding of the suitability of different algorithms for specific tasks, intending to guide future developments and support informed decision-making in the realm of lower-limb exoskeleton and AI applications."
