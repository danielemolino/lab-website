- key: "guarrasi2025wholebody"
  title: "Whole-Body Image-to-Image Translation for a Virtual Scanner in a Healthcare Digital Twin"
  author: "Valerio Guarrasi and Francesco Di Feola and Rebecca Restivo and Lorenzo Tronchin and Paolo Soda"
  venue: "2025 IEEE 38th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2025"
  doi: "10.1109/CBMS65348.2025.00114"
  doi_url: "https://doi.org/10.1109/CBMS65348.2025.00114"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/CBMS65348.2025.00114"
  abstract: "Generating positron emission tomography (PET) images from computed tomography (CT) scans via deep learning offers a promising pathway to reduce radiation exposure and costs associated with PET imaging, improving patient care and accessibility to functional imaging. Whole-body image translation presents challenges due to anatomical heterogeneity, often limiting generalized models. We propose a framework that segments whole-body CT images into four regions, i.e., head, trunk, arms, and legs, and uses district-specific Generative Adversarial Networks (GANs) for tailored CT-to-PET translation. Synthetic PET images from each region are stitched together to reconstruct the whole-body scan. Comparisons with a baseline non-segmented GAN and experiments with Pix2Pix and CycleGAN architectures tested paired and unpaired scenarios. Quantitative evaluations at district, whole-body, and lesion levels demonstrated significant improvements with our district-specific GANs. Pix2Pix yielded superior metrics, ensuring precise, high-quality image synthesis. By addressing anatomical heterogeneity, this approach achieves state-of-the-art results in whole-body CT-to-PET translation. This methodology supports healthcare Digital Twins by enabling accurate virtual PET scans from CT data, creating virtual imaging representations to monitor, predict, and optimize health outcomes."
  keywords: "medical imaging; generative AI"
  projects: "agri-industrial-ai-systems"
- key: "guarrasi2025timingis"
  title: "Timing Is Everything: Finding the Optimal Fusion Points in Multimodal Medical Imaging"
  author: "Valerio Guarrasi and Klara Mogensen and Sara Tassinari and Sara Qvarlander and Paolo Soda"
  venue: "2025 International Joint Conference on Neural Networks (IJCNN)"
  year: "2025"
  doi: "10.1109/IJCNN64981.2025.11227201"
  doi_url: "https://doi.org/10.1109/IJCNN64981.2025.11227201"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/IJCNN64981.2025.11227201"
  abstract: "Multimodal deep learning harnesses diverse imaging modalities, such as MRI sequences, to enhance diagnostic accuracy in medical imaging. A key challenge is determining the optimal timing for integrating these modalities—specifically, identifying the network layers where fusion modules should be inserted. Current approaches often rely on manual tuning or exhaustive search, which are computationally expensive without any guarantee of converging to optimal results. We propose a sequential forward search algorithm that incrementally activates and evaluates candidate fusion modules at different layers of a multimodal network. At each step, the algorithm retrains from previously learned weights and compares validation loss to identify the best-performing configuration. This process systematically reduces the search space, enabling efficient identification of the optimal fusion timing without exhaustively testing all possible module placements. The approach is validated on two multimodal MRI datasets, each addressing different classification tasks. Our algorithm consistently identified configurations that outperformed unimodal baselines, late fusion, and a brute-force ensemble of all potential fusion placements. These architectures demonstrated superior accuracy, F-score, and specificity while maintaining competitive or improved AUC values. Furthermore, the sequential nature of the search significantly reduced computational overhead, making the optimization process more practical. By systematically determining the optimal timing to fuse imaging modalities, our method advances multimodal deep learning for medical imaging. It provides an efficient and robust framework for fusion optimization, paving the way for improved clinical decision-making and more adaptable, scalable architectures in medical AI applications."
  keywords: "multimodal learning; medical imaging"
  projects: ""
- key: "guarrasi2025beyondunimodal"
  title: "Beyond unimodal analysis: Multimodal ensemble learning for enhanced assessment of atherosclerotic disease progression"
  author: "Valerio Guarrasi and Amanda Bertgren and Ulf Näslund and Patrik Wennberg and Paolo Soda and Christer Grönlund"
  venue: "Computerized Medical Imaging and Graphics"
  year: "2025"
  doi: "10.1016/j.compmedimag.2025.102617"
  doi_url: "https://doi.org/10.1016/j.compmedimag.2025.102617"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1016/j.compmedimag.2025.102617"
  abstract: "Atherosclerosis is a leading cardiovascular disease typified by fatty streaks accumulating within arterial walls, culminating in potential plaque ruptures and subsequent strokes. Existing clinical risk scores, such as systematic coronary risk estimation and Framingham risk score, profile cardiovascular risks based on factors like age, cholesterol, and smoking, among others. However, these scores display limited sensitivity in early disease detection. Parallelly, ultrasound-based risk markers, such as the carotid intima media thickness, while informative, only offer limited predictive power. Notably, current models largely focus on either ultrasound image-derived risk markers or clinical risk factor data without combining both for a comprehensive, multimodal assessment. This study introduces a multimodal ensemble learning framework to assess atherosclerosis severity, especially in its early sub-clinical stage. We utilize a multi-objective optimization targeting both performance and diversity, aiming to integrate features from each modality effectively. Our objective is to measure the efficacy of models using multimodal data in assessing vascular aging, i.e., plaque presence and vascular age, over a six-year period. We also delineate a procedure for optimal model selection from a vast pool, focusing on best-suited models for classification tasks. Additionally, through eXplainable Artificial Intelligence techniques, this work delves into understanding key model contributors and discerning unique subject subgroups."
  keywords: "multimodal learning; clinical prediction"
  projects: ""
- key: "guarrasi2025asystematic"
  title: "A systematic review of intermediate fusion in multimodal deep learning for biomedical applications"
  author: "Valerio Guarrasi and Fatih Aksu and Camillo Maria Caruso and Francesco Di Feola and Aurora Rofena and Filippo Ruffini and Paolo Soda"
  venue: "Image and Vision Computing"
  year: "2025"
  doi: "10.1016/j.imavis.2025.105509"
  doi_url: "https://doi.org/10.1016/j.imavis.2025.105509"
  pdf: ""
  code: "https://github.com/cosbidev/Intermediate-Multimodal-Fusion-Bio"
  website: ""
  url: "https://doi.org/10.1016/j.imavis.2025.105509"
  abstract: "Deep learning has revolutionized biomedical research by providing sophisticated methods to handle complex, high-dimensional data. Multimodal deep learning (MDL) further enhances this capability by integrating diverse data types such as imaging, textual data, and genetic information, leading to more robust and accurate predictive models. In MDL, differently from early and late fusion methods, intermediate fusion stands out for its ability to effectively combine modality-specific features during the learning process. This systematic review comprehensively analyzes and formalizes current intermediate fusion methods in biomedical applications, highlighting their effectiveness in improving predictive performance and capturing complex inter-modal relationships. We investigate the techniques employed, the challenges faced, and potential future directions for advancing intermediate fusion methods. Additionally, we introduce a novel structured notation that standardizes intermediate fusion architectures, enhancing understanding and facilitating implementation across various domains. Our findings provide actionable insights and practical guidelines intended to support researchers, healthcare professionals, and the broader deep learning community in developing more sophisticated and insightful multimodal models. Through this review, we aim to provide a foundational framework for future research and practical applications in the dynamic field of MDL. • Comprehensive review of intermediate fusion in multimodal learning in biomedicine. • Structured notation for categorizing intermediate fusion methods. • Analysis of the benefits and challenges of intermediate fusion in biomedical contexts. • Identification of future research directions for improving current fusion techniques. • Versatile framework applicable to other multimodal deep learning domains."
  keywords: "multimodal learning"
