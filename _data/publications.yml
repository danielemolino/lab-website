- key: "paolo2025hierarchicalembedding"
  title: "Hierarchical embedding attention for overall survival prediction in lung cancer from unstructured EHRs"
  author: "Domenico Paolo and Carlo Greco and Alessio Cortellini and Sara Ramella and Paolo Soda and Alessandro Bria and Rosa Sicilia"
  venue: "BMC Medical Informatics and Decision Making"
  year: "2025"
  doi: "10.1186/s12911-025-02998-6"
  doi_url: "https://doi.org/10.1186/s12911-025-02998-6"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1186/s12911-025-02998-6"
  abstract: "Abstract The automated processing of Electronic Health Records (EHRs) poses a significant challenge due to their unstructured nature, rich in valuable, yet disorganized information. Natural Language Processing (NLP), particularly Named Entity Recognition (NER), has been instrumental in extracting structured information from EHR data. However, existing literature primarly focuses on extracting handcrafted clinical features through NLP and NER methods without delving into their learned representations. In this work, we explore the untapped potential of these representations by considering their contextual richness and entity-specific information. Our proposed methodology extracts representations generated by a transformer-based NER model on EHRs data, combines them using a hierarchical attention mechanism, and employs the obtained enriched representation as input for a clinical prediction model. Specifically, this study addresses Overall Survival (OS) in Non-Small Cell Lung Cancer (NSCLC) using unstructured EHRs data collected from an Italian clinical centre encompassing 838 records from 231 lung cancer patients. Whilst our study is applied on EHRs written in Italian, it serves as use case to prove the effectiveness of extracting and employing high level textual representations that capture relevant information as named entities. Our methodology is interpretable because the hierarchical attention mechanism highlights the information in EHRs that the model considers the most crucial during the decision-making process. We validated this interpretability by measuring the agreement of domain experts on the importance assigned by the hierarchical attention mechanism to EHRs information through a questionnaire. Results demonstrate the effectiveness of our method, showcasing statistically significant improvements over traditional manually extracted clinical features."
  keywords: "oncology; foundation models; generative AI"
