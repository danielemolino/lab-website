- key: "piccolo2024radiomicsfor"
  title: "Radiomics for Predicting Prognostic Factors in Breast Cancer: Insights from Contrast-Enhanced Mammography (CEM)"
  author: "Claudia Lucia Piccolo and Marina Sarli and Matteo Pileri and Manuela Tommasiello and Aurora Rofena and Valerio Guarrasi and Paolo Soda and Bruno Beomonte Zobel"
  venue: "Journal of Clinical Medicine"
