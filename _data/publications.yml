- key: "feola2025hybrid3d"
  title: "Hybrid 3D CNN-MAMBA for Emphysema Classification in the SCAPIS Cohort"
  author: "Francesco Di Feola and Marida De Maria and Göran Bergström and Anders Blomberg and Åse A. Johnsson and Pierangelo Veltri and Paolo Soda"
  venue: "2025 IEEE 38th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2025"
  doi: "10.1109/cbms65348.2025.00141"
  doi_url: "https://doi.org/10.1109/cbms65348.2025.00141"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/cbms65348.2025.00141"
  url: "https://doi.org/10.1109/cbms65348.2025.00141"
  abstract: "Emphysema is a hallmark of Chronic Obstructive Pulmonary Disease and an independent risk factor for lung cancer. Computed Tomography (CT) is the main diagnostic platform for identifying emphysema. In clinical practice, the quantitative assessment identifies emphysema as low attenuation areas under a specific cut-off threshold set to -950 Hounsfield Unit. Despite its wide adoption, this method lacks consensus on an optimal cut-off threshold and is prone to measurement variation, asking for new solutions that encompass this limitation. We propose a hybrid deep learning approach for emphysema classification that combines convolutional neural networks for local feature extraction with MAMBA's capability to model long-range dependencies. This fusion ensures a complementary feature representation, capturing both fine-grained and global contextual information. Furthermore, we demonstrate the effectiveness of self-supervised pretraining in domain-specific data, refining the weight configuration of the model to better align with the target distribution and improve its performance during supervised training. The results show on the SCAPIS public cohort that our hybrid model not only outperforms the traditional LAV950 method for emphysema quantification but also surpasses two well-established deep learning architectures. The code is available at: https://github.com/TrainLaboratory/Emphysema."
  keywords: "oncology; multimodal learning; clinical prediction"
  projects: ""
- key: "coser2025deeplearning"
  title: "Deep learning for human locomotion analysis in lower-limb exoskeletons: a comparative study"
  author: "Omar Coser and Christian Tamantini and Matteo Tortora and Leonardo Furia and Rosa Sicilia and Loredana Zollo and Paolo Soda"
  venue: "Frontiers in Computer Science"
  year: "2025"
  doi: "10.3389/fcomp.2025.1597143"
  doi_url: "https://doi.org/10.3389/fcomp.2025.1597143"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3389/fcomp.2025.1597143"
  abstract: "Introduction Wearable robotics for lower-limb assistance is increasingly investigated to enhance mobility in individuals with physical impairments and to augment performance in able-bodied users. A major challenge in this domain is the development of accurate and adaptive control systems that ensure seamless human-robot interaction across diverse terrains. While neural networks have recently shown promise in time-series analysis, no prior work has tackled the combined task of classifying ground conditions into five terrain classes and estimating high-level locomotion parameters such as ramp slope and stair height. Methods This study presents an experimental comparison of eight deep neural network architectures for terrain classification and locomotion parameter estimation. The models are trained on the publicly available CAMARGO 2021 dataset using inertial (IMU) and electromyographic (EMG) signals. Particular attention is given to evaluating the performance of IMU-only inputs versus combined IMU+EMG data, with an emphasis on cost-efficiency and sensor minimization. The tested architectures include LSTM, CNN, and hybrid CNN-LSTM models, among others. Model explainability is assessed via SHAP analysis to guide sensor selection. Results IMU-only configurations matched or outperformed those using both IMU and EMG, supporting a more efficient setup. The LSTM model, using only three IMU sensors, achieved high terrain classification accuracy (0.94 ± 0.04) and reliably estimated ramp slopes (1.95 ± 0.58°). The CNN-LSTM architecture demonstrated superior performance in stair height estimation, achieving a accuracy of 15.65 ± 7.40 mm. SHAP analysis confirmed that sensor reduction did not compromise model accuracy. Discussion The results highlight the feasibility of using lightweight, IMU-only setups for real-time terrain classification and locomotion parameter estimation. The proposed system achieves an inference time of ~2 ms, making it suitable for real-time wearable robotics applications. This study paves the way for more accessible and deployable solutions in assistive and augmentative lower-limb robotic systems. Code and models are publicly available at: [ https://github.com/cosbidev/Human-Locomotion-Identification ]."
  keywords: "explainability; medical imaging"
  projects: ""
- key: "caruso2025mariaa"
  title: "MARIA: A multimodal transformer model for incomplete healthcare data"
  author: "Camillo Maria Caruso and Paolo Soda and Valerio Guarrasi"
  venue: "Computers in Biology and Medicine"
  year: "2025"
  doi: "10.1016/j.compbiomed.2025.110843"
  doi_url: "https://doi.org/10.1016/j.compbiomed.2025.110843"
  pdf: ""
  code: "https://github.com/cosbidev/MARIA"
  website: ""
  url: "https://doi.org/10.1016/j.compbiomed.2025.110843"
  abstract: "In healthcare, the integration of multimodal data is pivotal for developing comprehensive diagnostic and predictive models. However, managing missing data remains a significant challenge in real-world applications. We introduce MARIA (Multimodal Attention Resilient to Incomplete datA), a novel transformer-based deep learning model designed to address these challenges through an intermediate fusion strategy. Unlike conventional approaches that depend on imputation, MARIA utilizes a modified masked self-attention mechanism, which processes only the available data without generating synthetic values. This approach enables it to effectively handle incomplete datasets, enhancing robustness and minimizing biases introduced by imputation methods. We evaluated MARIA against 10 state-of-the-art machine learning and deep learning models across 8 diagnostic and prognostic tasks. The results demonstrate that MARIA outperforms existing methods in terms of performance and resilience to varying levels of data incompleteness, underscoring its potential for critical healthcare applications. To support transparency and encourage further research, the source code is openly available at https://github.com/cosbidev/MARIA."
  keywords: "multimodal learning; foundation models; clinical prediction"
  projects: "clinical-risk-stratification"
- key: "caragliano2025multimodaldoctor"
  title: "Multimodal Doctor-in-the-Loop: A Clinically-Guided Explainable Framework for Predicting Pathological Response in Non-Small Cell Lung Cancer"
  author: "Alice Natalina Caragliano and Claudia Tacconi and Carlo Greco and Lorenzo Nibid and Edy Ippolito and Michele Fiore and Giuseppe Perrone and Sara Ramella and Paolo Soda and Valerio Guarrasi"
  venue: "2025 International Joint Conference on Neural Networks (IJCNN)"
  year: "2025"
  doi: "10.1109/ijcnn64981.2025.11228780"
  doi_url: "https://doi.org/10.1109/ijcnn64981.2025.11228780"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/ijcnn64981.2025.11228780"
  abstract: "This study proposes a novel approach combining Multimodal Deep Learning with intrinsic eXplainable Artificial Intelligence techniques to predict pathological response in non-small cell lung cancer patients undergoing neoadjuvant therapy. Due to the limitations of existing radiomics and unimodal deep learning approaches, we introduce an intermediate fusion strategy that integrates imaging and clinical data, enabling efficient interaction between data modalities. The proposed Multimodal Doctor-in-the-Loop method further enhances clinical relevance by embedding clinicians’ domain knowledge directly into the training process, guiding the model’s focus gradually from broader lung regions to specific lesions. Results demonstrate improved predictive accuracy and explainability, providing insights into optimal data integration strategies for clinical applications."
  keywords: "radiomics; oncology; multimodal learning"
  projects: ""
- key: "caragliano2025doctorin"
  title: "Doctor-in-the-Loop: An explainable, multi-view deep learning framework for predicting pathological response in non-small cell lung cancer"
  author: "Alice Natalina Caragliano and Filippo Ruffini and Carlo Greco and Edy Ippolito and Michele Fiore and Claudia Tacconi and Lorenzo Nibid and Giuseppe Perrone and Sara Ramella and Paolo Soda and Valerio Guarrasi"
  venue: "Image and Vision Computing"
  year: "2025"
  doi: "10.1016/j.imavis.2025.105630"
  doi_url: "https://doi.org/10.1016/j.imavis.2025.105630"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1016/j.imavis.2025.105630"
  abstract: "Non-small cell lung cancer (NSCLC) remains a major global health challenge, with high post-surgical recurrence rates underscoring the need for accurate pathological response predictions to guide personalized treatments. Although artificial intelligence models show promise in this domain, their clinical adoption is limited by the lack of medically grounded guidance during training, often resulting in non-explainable intrinsic predictions. To address this, we propose Doctor-in-the-Loop , a novel framework that integrates expert-driven domain knowledge with explainable artificial intelligence techniques, directing the model toward clinically relevant anatomical regions and improving both interpretability and trustworthiness. Our approach employs a gradual multi-view strategy, progressively refining the model’s focus from broad contextual features to finer, lesion-specific details. By incorporating domain insights at every stage, we enhance predictive accuracy while ensuring that the model’s decision-making process aligns more closely with clinical reasoning. Evaluated on a dataset of NSCLC patients, Doctor-in-the-Loop delivers promising predictive performance and provides transparent, justifiable outputs, representing a significant step toward clinically explainable artificial intelligence in oncology. • Integrating clinical expertise with XAI for NSCLC pathological response prediction. • Gradual multi-view strategy refines focus from context to lesion-specific regions. • Improved explainability guides the model to clinically relevant anatomical regions. • Outperforms state-of-the-art, achieving higher accuracy and clinical relevance."
  keywords: "explainability; oncology; medical imaging"
  projects: "multimodal-virtual-biopsy; clinical-risk-stratification"
- key: "cammarata2025machinelearning"
  title: "Machine Learning for Predicting the Low Risk of Postoperative Pancreatic Fistula After Pancreaticoduodenectomy: Toward a Dynamic and Personalized Postoperative Management Strategy"
  author: "Roberto Cammarata and Filippo Ruffini and Alberto Catamerò and Gennaro Melone and Gianluca Costa and Silvia Angeletti and Federico Seghetti and Vincenzo La Vaccara and Roberto Coppola and Paolo Soda and Valerio Guarrasi and Damiano Caputo"
  venue: "Cancers"
  year: "2025"
  doi: "10.3390/cancers17111846"
  doi_url: "https://doi.org/10.3390/cancers17111846"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/cancers17111846"
  abstract: "Background. Postoperative pancreatic fistula (POPF) remains one of the most relevant complications following pancreaticoduodenectomy (PD), significantly impacting short-term outcomes and delaying adjuvant therapies. Current predictive models offer limited accuracy, often failing to incorporate early postoperative data. This retrospective study aimed to develop and validate machine learning (ML) models to predict the absence and severity of POPF using clinical, surgical, and early postoperative variables. Methods. Data from 216 patients undergoing PD were analyzed. A total of twenty-four machine learning (ML) algorithms were systematically evaluated using the Matthews Correlation Coefficient (MCC) and AUC-ROC metrics. Among these, the GradientBoostingClassifier consistently outperformed all other models, demonstrating the best predictive performance, particularly in identifying patients at low risk of postoperative pancreatic fistula (POPF) during the early postoperative period. To enhance transparency and interpretability, a SHAP (SHapley Additive exPlanations) analysis was applied, highlighting the key role of early postoperative biomarkers in the model predictions. Results. The performance of the GradientBoostingClassifier was also directly compared to that of a traditional logistic regression model, confirming the superior predictive performance over conventional approaches. This study demonstrates that ML can effectively stratify POPF risk, potentially supporting early drain removal and optimizing postoperative management. Conclusions. While the model showed promising performance in a single-center cohort, external validation across different surgical settings will be essential to confirm its generalizability and clinical utility. The integration of ML into clinical workflows may represent a step forward in delivering personalized and dynamic care after pancreatic surgery."
  keywords: "clinical prediction; oncology"
  projects: ""
- key: "bertgren2025generativeadversarial"
  title: "Generative Adversarial Networks for Synthetic Longitudinal Electronic Health Records Enabling Cardiovascular Digital Twins"
  author: "Amanda Bertgren and Fredrik Öhberg and Paolo Soda and Ulf Näslund and Patrik Wennberg and Christer Grönlund"
  venue: "2025 IEEE 38th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2025"
  doi: "10.1109/cbms65348.2025.00015"
  doi_url: "https://doi.org/10.1109/cbms65348.2025.00015"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/cbms65348.2025.00015"
  url: "https://doi.org/10.1109/cbms65348.2025.00015"
  abstract: "The silent progression of cardiovascular disease (CVD) is a major problem particularly in CVD prevention. New techniques enabled by the rise of electronic health records may facilitate CVD prevention. Both public health research and big data applications, such as digital twins, are dependent on access to longitudinal and sensitive data; a challenge which may be facilitated by access to longitudinal synthetic data. In this study, we establish a fidelity benchmark for longitudinal synthetic data by extending a well-known method for cross-sectional synthetic data to a longitudinal application within CVD. We find that the univariate distributional difference between the real and the synthetic data is kept low and that pairwise relations are preserved in the synthetic data. Further, we see that the variablewise temporal trends are preserved, yet may be more extensively studied and have some room for improvement. The results of this study is important to enable future studies within public health prevention and cardiovascular digital twins."
