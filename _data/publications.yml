  projects: "multimodal-virtual-biopsy"
- key: "ristori2024emergingmicroorganisms"
  title: "Emerging Microorganisms and Infectious Diseases: One Health Approach for Health Shared Vision"
  author: "Maria Vittoria Ristori and Valerio Guarrasi and Paolo Soda and Nicola Petrosillo and Fiorella Gurrieri and Umile Giuseppe Longo and Massimo Ciccozzi and Elisabetta Riva and Silvia Angeletti"
  venue: "Genes"
  year: "2024"
  doi: "10.3390/genes15070908"
  doi_url: "https://doi.org/10.3390/genes15070908"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/genes15070908"
  abstract: "Emerging infectious diseases (EIDs) are newly emerging and reemerging infectious diseases. The National Institute of Allergy and Infectious Diseases identifies the following as emerging infectious diseases: SARS, MERS, COVID-19, influenza, fungal diseases, plague, schistosomiasis, smallpox, tick-borne diseases, and West Nile fever. The factors that should be taken into consideration are the genetic adaptation of microbial agents and the characteristics of the human host or environment. The new approach to identifying new possible pathogens will have to go through the One Health approach and omics integration data, which are capable of identifying high-priority microorganisms in a short period of time. New bioinformatics technologies enable global integration and sharing of surveillance data for rapid public health decision-making to detect and prevent epidemics and pandemics, ensuring timely response and effective prevention measures. Machine learning tools are being more frequently utilized in the realm of infectious diseases to predict sepsis in patients, diagnose infectious diseases early, and forecast the effectiveness of treatment or the appropriate choice of antibiotic regimen based on clinical data. We will discuss emerging microorganisms, omics techniques applied to infectious diseases, new computational solutions to evaluate biomarkers, and innovative tools that are useful for integrating omics data and electronic medical records data for the clinical management of emerging infectious diseases."
