- key: "celli2022mriand"
  title: "MRI- and Histologic-Molecular-Based Radio-Genomics Nomogram for Preoperative Assessment of Risk Classes in Endometrial Cancer"
  author: "Veronica Celli and Michele Guerreri and Angelina Pernazza and Ilaria Cuccu and Innocenza Palaia and Federica Tomao and Violante Di Donato and Paola Pricolo and Giada Ercolani and Sandra Ciulla and Nicoletta Colombo and Martina Leopizzi and Valeria Di Maio and Eliodoro Faiella and Domiziana Santucci and Paolo Soda and Ermanno Cordelli and Giorgia Perniola and Benedetta Gui and Stefania Rizzo and Carlo Della Rocca and Giuseppe Petralia and Carlo Catalano and Lucia Manganaro"
  venue: "Cancers"
  year: "2022"
  doi: "10.3390/cancers14235881"
  doi_url: "https://doi.org/10.3390/cancers14235881"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/cancers14235881"
  abstract: "High- and low-risk endometrial carcinoma (EC) differ in whether or not a lymphadenectomy is performed. We aimed to develop MRI-based radio-genomic models able to preoperatively assess lymph-vascular space invasion (LVSI) and discriminate between low- and high-risk EC according to the ESMO-ESGO-ESTRO 2020 guidelines, which include molecular risk classification proposed by “ProMisE”. This is a retrospective, multicentric study that included 64 women with EC who underwent 3T-MRI before a hysterectomy. Radiomics features were extracted from T2WI images and apparent diffusion coefficient maps (ADC) after manual segmentation of the gross tumor volume. We constructed a multiple logistic regression approach from the most relevant radiomic features to distinguish between low- and high-risk classes under the ESMO-ESGO-ESTRO 2020 guidelines. A similar approach was taken to assess LVSI. Model diagnostic performance was assessed via ROC curves, accuracy, sensitivity and specificity on training and test sets. The LVSI predictive model used a single feature from ADC as a predictor; the risk class model used two features as predictors from both ADC and T2WI. The low-risk predictive model showed an AUC of 0.74 with an accuracy, sensitivity, and specificity of 0.74, 0.76, 0.94; the LVSI model showed an AUC of 0.59 with an accuracy, sensitivity, and specificity of 0.60, 0.50, 0.61. MRI-based radio-genomic models are useful for preoperative EC risk stratification and may facilitate therapeutic management."
  keywords: "radiomics; oncology; generative AI"
  projects: ""
- key: "caruso2022amultimodal"
  title: "A Multimodal Ensemble Driven by Multiobjective Optimisation to Predict Overall Survival in Non-Small-Cell Lung Cancer"
  author: "Camillo Maria Caruso and Valerio Guarrasi and Ermanno Cordelli and Rosa Sicilia and Silvia Gentile and Laura Messina and Michele Fiore and Claudia Piccolo and Bruno Beomonte Zobel and Giulio Iannello and Sara Ramella and Paolo Soda"
  venue: "Journal of Imaging"
  year: "2022"
  doi: "10.3390/jimaging8110298"
  doi_url: "https://doi.org/10.3390/jimaging8110298"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/jimaging8110298"
  abstract: "Lung cancer accounts for more deaths worldwide than any other cancer disease. In order to provide patients with the most effective treatment for these aggressive tumours, multimodal learning is emerging as a new and promising field of research that aims to extract complementary information from the data of different modalities for prognostic and predictive purposes. This knowledge could be used to optimise current treatments and maximise their effectiveness. To predict overall survival, in this work, we investigate the use of multimodal learning on the CLARO dataset, which includes CT images and clinical data collected from a cohort of non-small-cell lung cancer patients. Our method allows the identification of the optimal set of classifiers to be included in the ensemble in a late fusion approach. Specifically, after training unimodal models on each modality, it selects the best ensemble by solving a multiobjective optimisation problem that maximises both the recognition performance and the diversity of the predictions. In the ensemble, the labels of each sample are assigned using the majority voting rule. As further validation, we show that the proposed ensemble outperforms the models learning a single modality, obtaining state-of-the-art results on the task at hand."
  keywords: "multimodal learning; oncology; clinical prediction"
  projects: "clinical-risk-stratification"
- key: "calabrese20223tmri"
  title: "3T-MRI Artificial Intelligence in Patients with Invasive Breast Cancer to Predict Distant Metastasis Status: A Pilot Study"
  author: "Alessandro Calabrese and Domiziana Santucci and Michela Gravina and Eliodoro Faiella and Ermanno Cordelli and Paolo Soda and Giulio Iannello and Carlo Sansone and Bruno Beomonte Zobel and Carlo Catalano and Carlo de Felice"
  venue: "Cancers"
  year: "2022"
  doi: "10.3390/cancers15010036"
  doi_url: "https://doi.org/10.3390/cancers15010036"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/cancers15010036"
  abstract: "Background: The incidence of breast cancer metastasis has decreased over the years. However, 20–30% of patients with early breast cancer still die from metastases. The purpose of this study is to evaluate the performance of a Deep Learning Convolutional Neural Networks (CNN) model to predict the risk of distant metastasis using 3T-MRI DCE sequences (Dynamic Contrast-Enhanced). Methods: A total of 157 breast cancer patients who underwent staging 3T-MRI examinations from January 2011 to July 2022 were retrospectively examined. Patient data, tumor histological and MRI characteristics, and clinical and imaging follow-up examinations of up to 7 years were collected. Of the 157 MRI examinations, 39/157 patients (40 lesions) had distant metastases, while 118/157 patients (120 lesions) were negative for distant metastases (control group). We analyzed the role of the Deep Learning technique using a single variable size bounding box (SVB) option and employed a Voxel Based (VB) NET CNN model. The CNN performance was evaluated in terms of accuracy, sensitivity, specificity, and area under the ROC curve (AUC). Results: The VB-NET model obtained a sensitivity, specificity, accuracy, and AUC of 52.50%, 80.51%, 73.42%, and 68.56%, respectively. A significant correlation was found between the risk of distant metastasis and tumor size, and the expression of PgR and HER2. Conclusions: We demonstrated a currently insufficient ability of the Deep Learning approach in predicting a distant metastasis status in patients with BC using CNNs."
  keywords: "radiomics; oncology; medical imaging"
  projects: ""
- key: "soda2021aiforcovidpredicting"
  title: "AIforCOVID: Predicting the clinical outcomes in patients with COVID-19 applying AI to chest-X-rays. An Italian multicentre study"
  author: "Paolo Soda and Natascha Claudia D'Amico and Jacopo Tessadori and Giovanni Valbusa and Valerio Guarrasi and Chandra Bortolotto and Muhammad Usman Akbar and Rosa Sicilia and Ermanno Cordelli and Deborah Fazzini and Michaela Cellina and Giancarlo Oliva and Giovanni Callea and Silvia Panella and Maurizio Cariati and Diletta Cozzi and Vittorio Miele and Elvira Stellato and Gianpaolo Carrafiello and Giulia Castorani and Annalisa Simeone and Lorenzo Preda and Giulio Iannello and Alessio Del Bue and Fabio Tedoldi and Marco Alí and Diego Sona and Sergio Papa"
  venue: "Medical Image Analysis"
