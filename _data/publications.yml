- key: "cordelli2021visual4dtrackera"
  title: "Visual4DTracker: a tool to interact with 3D + t image stacks"
  author: "Ermanno Cordelli and Paolo Soda and Giulio Iannello"
  venue: "BMC Bioinformatics"
  year: "2021"
  doi: "10.1186/s12859-020-03820-y"
  doi_url: "https://doi.org/10.1186/s12859-020-03820-y"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1186/s12859-020-03820-y"
  abstract: "Abstract Background Biological phenomena usually evolves over time and recent advances in high-throughput microscopy have made possible to collect multiple 3 D images over time, generating $$3D+t$$ 3 D + t (or 4 D ) datasets. To extract useful information there is the need to extract spatial and temporal data on the particles that are in the images, but particle tracking and feature extraction need some kind of assistance. Results This manuscript introduces our new freely downloadable toolbox, the Visual4DTracker . It is a MATLAB package implementing several useful functionalities to navigate, analyse and proof-read the track of each particle detected in any $$3D+t$$ 3 D + t stack. Furthermore, it allows users to proof-read and to evaluate the traces with respect to a given gold standard. The Visual4DTracker toolbox permits the users to visualize and save all the generated results through a user-friendly graphical user interface. This tool has been successfully used in three applicative examples. The first processes synthetic data to show all the software functionalities. The second shows how to process a 4 D image stack showing the time-lapse growth of Drosophila cells in an embryo. The third example presents the quantitative analysis of insulin granules in living beta-cells, showing that such particles have two main dynamics that coexist inside the cells. Conclusions Visual4DTracker is a software package for MATLAB to visualize, handle and manually track $$3D+t$$ 3 D + t stacks of microscopy images containing objects such cells, granules, etc.. With its unique set of functions, it remarkably permits the user to analyze and proof-read 4 D data in a friendly 3 D fashion. The tool is freely available at https://drive.google.com/drive/folders/19AEn0TqP-2B8Z10kOavEAopTUxsKUV73?usp=sharing"
  keywords: "medical imaging"
  projects: ""
- key: "ramella2018aradiomic"
  title: "A radiomic approach for adaptive radiotherapy in non-small cell lung cancer patients"
  author: "Sara Ramella and Michele Fiore and Carlo Greco and Ermanno Cordelli and Rosa Sicilia and Mario Merone and E. Molfese and M. Miele and Patrizia Cornacchione and Edy Ippolito and Giulio Iannello and Rolando Maria D’Angelillo and Paolo Soda"
  venue: "PLOS ONE"
  year: "2018"
  doi: "10.1371/journal.pone.0207455"
  doi_url: "https://doi.org/10.1371/journal.pone.0207455"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1371/journal.pone.0207455"
  abstract: "The primary goal of precision medicine is to minimize side effects and optimize efficacy of treatments. Recent advances in medical imaging technology allow the use of more advanced image analysis methods beyond simple measurements of tumor size or radiotracer uptake metrics. The extraction of quantitative features from medical images to characterize tumor pathology or heterogeneity is an interesting process to investigate, in order to provide information that may be useful to guide the therapies and predict survival. This paper discusses the rationale supporting the concept of radiomics and the feasibility of its application to Non-Small Cell Lung Cancer in the field of radiation oncology research. We studied 91 stage III patients treated with concurrent chemoradiation and adaptive approach in case of tumor reduction during treatment. We considered 12 statistics features and 230 textural features extracted from the CT images. In our study, we used an ensemble learning method to classify patients' data into either the adaptive or non-adaptive group during chemoradiation on the basis of the starting CT simulation. Our data supports the hypothesis that a specific signature can be identified (AUC 0.82). In our experience, a radiomic signature mixing semantic and image-based features has shown promising results for personalized adaptive radiotherapy in non-small cell lung cancer."
  keywords: "radiomics; oncology; clinical prediction"
  projects: ""
