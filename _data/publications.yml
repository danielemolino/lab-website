- key: "cordelli2024machinelearning"
  title: "Machine learning predicts pulmonary Long Covid sequelae using clinical data"
  author: "Ermanno Cordelli and Paolo Soda and Sara Citter and Elia Schiavon and Christian Salvatore and Deborah Fazzini and Greta Clementi and Michaela Cellina and Andrea Cozzi and Chandra Bortolotto and Lorenzo Preda and Luisa Francini and Matteo Tortora and Isabella Castiglioni and Sergio Papa and Diego Sona and Marco Alì"
  venue: "BMC Medical Informatics and Decision Making"
  year: "2024"
  doi: "10.1186/s12911-024-02745-3"
  doi_url: "https://doi.org/10.1186/s12911-024-02745-3"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1186/s12911-024-02745-3"
  abstract: "Abstract Long COVID is a multi-systemic disease characterized by the persistence or occurrence of many symptoms that in many cases affect the pulmonary system. These, in turn, may deteriorate the patient’s quality of life making it easier to develop severe complications. Being able to predict this syndrome is therefore important as this enables early treatment. In this work, we investigated three machine learning approaches that use clinical data collected at the time of hospitalization to this goal. The first works with all the descriptors feeding a traditional shallow learner, the second exploits the benefits of an ensemble of classifiers, and the third is driven by the intrinsic multimodality of the data so that different models learn complementary information. The experiments on a new cohort of data from 152 patients show that it is possible to predict pulmonary Long Covid sequelae with an accuracy of up to $$94\\%$$ 94 % . As a further contribution, this work also publicly discloses the related data repository to foster research in this field."
