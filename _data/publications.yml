- key: "rofena2024adeep"
  title: "A deep learning approach for virtual contrast enhancement in Contrast Enhanced Spectral Mammography"
  author: "Aurora Rofena and Valerio Guarrasi and Marina Sarli and Claudia Lucia Piccolo and Matteo Sammarra and Bruno Beomonte Zobel and Paolo Soda"
  venue: "Computerized Medical Imaging and Graphics"
  year: "2024"
