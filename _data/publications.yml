- key: "molino2025anyto"
  title: "Any-to-Any Vision-Language Model for Multimodal X-ray Imaging and Radiological Report Generation"
  author: "Daniele Molino and Francesco Di Feola and Linlin Shen and Paolo Soda and Valerio Guarrasi"
  venue: "2025 International Joint Conference on Neural Networks (IJCNN)"
  year: "2025"
  doi: "10.1109/IJCNN64981.2025.11227399"
  doi_url: "https://doi.org/10.1109/IJCNN64981.2025.11227399"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/IJCNN64981.2025.11227399"
  abstract: "Generative models have revolutionized Artificial Intelligence (AI), particularly in multimodal applications. However, adapting these models to the medical domain poses unique challenges due to the complexity of medical data and the stringent need for clinical accuracy. In this work, we introduce a framework specifically designed for multimodal medical data generation. By enabling the generation of multi-view chest X-rays and their associated clinical report, it bridges the gap between general-purpose vision-language models and the specialized requirements of healthcare. Leveraging the MIMIC-CXR dataset, the proposed framework shows superior performance in generating high-fidelity images and semantically coherent reports. Our quantitative evaluation reveals significant results in terms of FID and BLEU scores, showcasing the quality of the generated data. Notably, our framework achieves comparable or even superior performance compared to real data on downstream disease classification tasks, underlining its potential as a tool for medical research and diagnostics. This study highlights the importance of domain-specific adaptations in enhancing the relevance and utility of generative models for clinical applications, paving the way for future advancements in synthetic multimodal medical data generation."
  keywords: "foundation models; medical imaging; generative AI"
  projects: ""
- key: "mogensen2025anoptimized"
  title: "An optimized ensemble search approach for classification of higher-level gait disorder using brain magnetic resonance images"
  author: "Klara Mogensen and Valerio Guarrasi and Jenny Larsson and William Hansson and Anders Wahlin and Lars-Owe Koskinen and Jan Malm and Anders Eklund and Paolo Soda and Sara Qvarlander"
  venue: "Computers in Biology and Medicine"
  year: "2025"
  doi: "10.1016/j.compbiomed.2024.109457"
  doi_url: "https://doi.org/10.1016/j.compbiomed.2024.109457"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1016/j.compbiomed.2024.109457"
  abstract: "Higher-Level Gait Disorder (HLGD) is a type of gait disorder estimated to affect up to 6% of the older population. By definition, its symptoms originate from the higher-level nervous system, yet its association with brain morphology remains unclear. This study hypothesizes that there are patterns in brain morphology linked to HLGD. For the first time in the literature, this work investigates whether deep learning, in the form of convolutional neural networks, can capture patterns in magnetic resonance images to identify individuals affected by HLGD. To handle this new classification task, we propose setting up an ensemble of models. This leverages the benefits of combining classifiers instead of determining which network is the most suitable, developing a new architecture, or customizing an existing one. We introduce a computationally cost-effective search algorithm to find the optimal ensemble by leveraging a cost function of both traditional performance scores and the diversity among the models. Using a unique dataset from a large population-based cohort (VESPR), the ensemble identified by our algorithm demonstrated superior performance compared to single networks, other ensemble fusion techniques, and the best linear radiological measure. This emphasizes the importance of implementing diversity into the cost function. Furthermore, the results indicate significant morphological differences in brain structure between HLGD-affected individuals and controls, motivating research about which areas the networks base their classifications on, to get a better understanding of the pathophysiology of HLGD."
  keywords: "medical imaging; clinical prediction"
  projects: "explainable-brain-mri"
