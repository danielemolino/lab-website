- key: "feola2023acomparative"
  title: "A Comparative Study Between Paired And Unpaired Image Quality Assessment In Low-Dose CT Denoising"
  author: "Francesco Di Feola and Lorenzo Tronchin and Paolo Soda"
  venue: "2023 IEEE 36th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2023"
  doi: "10.1109/cbms58004.2023.00264"
  doi_url: "https://doi.org/10.1109/cbms58004.2023.00264"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/cbms58004.2023.00264"
  url: "https://doi.org/10.1109/cbms58004.2023.00264"
  abstract: "The current deep learning approaches for low-dose CT denoising can be divided into paired and unpaired methods. The former involves the use of well-paired datasets, whilst the latter relaxes this constraint. The large availability of unpaired datasets has raised the interest in deepening unpaired denoising strategies that, in turn, need for robust evaluation techniques going beyond the qualitative evaluation. To this end, we can use quantitative image quality assessment scores that we divided into two categories, i.e., paired and unpaired measures. However, the interpretation of unpaired metrics is not straightforward, also because the consistency with paired metrics has not been fully investigated. To cope with this limitation, in this work we consider 15 paired and unpaired scores, which we applied to assess the performance of low-dose CT denoising. We perform an in-depth statistical analysis that not only studies the correlation between paired and unpaired metrics but also within each category. This brings out useful guidelines that can help researchers and practitioners select the right measure for their applications."
  keywords: "medical imaging"
  projects: ""
- key: "cordelli2023makingai"
  title: "Making AI trustworthy in multimodal and healthcare scenarios"
  author: "Ermanno Cordelli and Valerio Guarrasi and Giulio Iannello and Rosa Sicilia and Paolo Soda and Lorenzo Tronchin"
  venue: "Journal of Life Science and Public Health"
  year: "2023"
  doi: "10.69739/jlsph.v2i1.1494"
  doi_url: "https://doi.org/10.69739/jlsph.v2i1.1494"
  pdf: ""
  code: ""
  website: "https://www.iris.unicampus.it/handle/20.500.12610/79227"
  url: "https://doi.org/10.69739/jlsph.v2i1.1494"
  abstract: "The increasing availability of heterogeneous healthcare data has accelerated the development of artificial intelligence (AI) systems for clinical decision support and personalized care. However, centralized multimodal AI remains constrained by data silos, privacy regulations, and limited generalizability, raising concerns about trust, fairness, and accountability. Federated learning offers a promising decentralized alternative, yet its integration with multimodal AI introduces additional technical, organizational, and governance challenges that remain insufficiently synthesized. This review provides a state-of-the-art analysis of multimodal federated AI for trustworthy and personalized healthcare. We examine advances in multimodal learning and federated systems, analyze their intersection in clinical settings, and highlight how multimodality amplifies challenges related to data heterogeneity, privacy, explainability, and robustness. Distinct from algorithm-centric surveys, we frame trustworthiness as a system-level property encompassing privacy, fairness, robustness, explainability, and governance. We introduce a unifying framework that organizes design choices across data, model, and system layers, enabling systematic evaluation of clinical trade-offs beyond predictive accuracy. Finally, we identify persistent evaluation gaps and outline future directions, including longitudinal personalization and federated foundation models. By centering trust and clinical readiness, this review clarifies the design and deployment pathways for multimodal federated AI systems that are not only high-performing, but also equitable, transparent, and clinically actionable."
  keywords: "explainability; multimodal learning"
  projects: ""
- key: "aksu2023earlyexperiences"
  title: "Early Experiences on using Triplet Networks for Histological Subtype Classification in Non-Small Cell Lung Cancer"
  author: "Fatih Aksu and Fabrizia Gelardi and Arturo Chiti and Paolo Soda"
  venue: "2023 IEEE 36th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2023"
  doi: "10.1109/cbms58004.2023.00328"
  doi_url: "https://doi.org/10.1109/cbms58004.2023.00328"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/cbms58004.2023.00328"
  url: "https://doi.org/10.1109/cbms58004.2023.00328"
  abstract: "Lung cancer has the highest mortality rate among tumours and an accurate pathological assessment is crucial to deliver personalized treatments to patients. The gold standard for pathological assessment requires invasive procedures, which are not always possible and might cause clinical complications. Therefore, in the last years, efforts have been directed towards the development of machine and deep learning approaches for virtual biopsy, which leverage routinely collected CT scans. However, in many cases, the available datasets are limited in size, an issue that limits the training of any model. In this paper, we investigate if triplet networks can cope with this limitation: they are a class of neural networks that uses the same weights while working in tandem on three different input vectors to minimize the loss function. In particular, on a dataset including 87 CT scans collected from patients suffering from non-small cell lung cancer, we experimentally compare triplet networks against plain deep networks when performing histological subtype classification. The results show that the former outperforms the latter in almost all experiments."
  keywords: "radiomics; oncology; medical imaging"
  projects: ""
- key: "tortora2022pytracka"
  title: "PyTrack: A Map-Matching-Based Python Toolbox for Vehicle Trajectory Reconstruction"
  author: "Matteo Tortora and Ermanno Cordelli and Paolo Soda"
  venue: "IEEE Access"
  year: "2022"
  doi: "10.1109/access.2022.3216565"
  doi_url: "https://doi.org/10.1109/access.2022.3216565"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/access.2022.3216565"
  abstract: 'The exponential growth of IoT devices, smartphones, smartwatches, and vehicles equipped with positioning technology, such as Global Positioning System (GPS) modules, has boosted the development of location-based services for several applications in Intelligent Transportation Systems. However, the inherent error of location-based technologies makes it necessary to align the positioning trajectories to the actual underlying road network, a process known as map-matching. To the best of our knowledge, there are no comprehensive tools that allow us to model street networks, conduct topological and spatial analyses of the underlying street graph, perform map-matching processes on GPS point trajectories, and deeply analyse and elaborate these reconstructed trajectories. To address this issue, we present PyTrack, an open-source map-matching-based Python toolbox designed for academics, researchers and practitioners that integrate the recorded GPS coordinates with data provided by the OpenStreetMap, an open-source geographic information system. This manuscript overviews the architecture of the library offering a detailed description of its capabilities and modules. Besides, we provide an introductory guide to getting started with PyTrack covering the most fundamental steps of our framework. For more information on PyTrack, users are encouraged to visit the official repository at <uri xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink">https://github.com/cosbidev/PyTrack</uri> or the official documentation at <uri xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink">https://pytrack-lib.readthedocs.io</uri> .'
  keywords: "clinical prediction; medical imaging"
  projects: ""
- key: "santucci2022cnnbased"
  title: "CNN-Based Approaches with Different Tumor Bounding Options for Lymph Node Status Prediction in Breast DCE-MRI"
  author: "Domiziana Santucci and Eliodoro Faiella and Michela Gravina and Ermanno Cordelli and Carlo de Felice and Bruno Beomonte Zobel and Giulio Iannello and Carlo Sansone and Paolo Soda"
  venue: "Cancers"
  year: "2022"
  doi: "10.3390/cancers14194574"
  doi_url: "https://doi.org/10.3390/cancers14194574"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/cancers14194574"
  abstract: "Background: The axillary lymph node status (ALNS) is one of the most important prognostic factors in breast cancer (BC) patients, and it is currently evaluated by invasive procedures. Dynamic contrast-enhanced magnetic resonance imaging (DCE-MRI), highlights the physiological and morphological characteristics of primary tumor tissue. Deep learning approaches (DL), such as convolutional neural networks (CNNs), are able to autonomously learn the set of features directly from images for a specific task. Materials and Methods: A total of 155 malignant BC lesions evaluated via DCE-MRI were included in the study. For each patient’s clinical data, the tumor histological and MRI characteristics and axillary lymph node status (ALNS) were assessed. LNS was considered to be the final label and dichotomized (LN+ (27 patients) vs. LN− (128 patients)). Based on the concept that peritumoral tissue contains valuable information about tumor aggressiveness, in this work, we analyze the contributions of six different tumor bounding options to predict the LNS using a CNN. These bounding boxes include a single fixed-size box (SFB), a single variable-size box (SVB), a single isotropic-size box (SIB), a single lesion variable-size box (SLVB), a single lesion isotropic-size box (SLIB), and a two-dimensional slice (2DS) option. According to the characteristics of the volumes considered as inputs, three different CNNs were investigated: the SFB-NET (for the SFB), the VB-NET (for the SVB, SIB, SLVB, and SLIB), and the 2DS-NET (for the 2DS). All the experiments were run in 10-fold cross-validation. The performance of each CNN was evaluated in terms of accuracy, sensitivity, specificity, the area under the ROC curve (AUC), and Cohen’s kappa coefficient (K). Results: The best accuracy and AUC are obtained by the 2DS-NET (78.63% and 77.86%, respectively). The 2DS-NET also showed the highest specificity, whilst the highest sensibility was attained by the VB-NET based on the SVB and SIB as bounding options. Conclusion: We have demonstrated that a selective inclusion of the DCE-MRI’s peritumoral tissue increases accuracy in the lymph node status prediction in BC patients using CNNs as a DL approach."
  keywords: "radiomics; oncology; clinical prediction"
  projects: ""
- key: "guarrasi2022paretooptimization"
  title: "Pareto optimization of deep networks for COVID-19 diagnosis from chest X-rays"
  author: "Valerio Guarrasi and Natascha Claudia D'Amico and Rosa Sicilia and Ermanno Cordelli and Paolo Soda"
  venue: "Pattern Recognition"
  year: "2022"
  doi: "10.1016/j.patcog.2021.108242"
  doi_url: "https://doi.org/10.1016/j.patcog.2021.108242"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1016/j.patcog.2021.108242"
  abstract: "The year 2020 was characterized by the COVID-19 pandemic that has caused, by the end of March 2021, more than 2.5 million deaths worldwide. Since the beginning, besides the laboratory test, used as the gold standard, many applications have been applying deep learning algorithms to chest X-ray images to recognize COVID-19 infected patients. In this context, we found out that convolutional neural networks perform well on a single dataset but struggle to generalize to other data sources. To overcome this limitation, we propose a late fusion approach where we combine the outputs of several state-of-the-art CNNs, introducing a novel method that allows us to construct an optimum ensemble determining which and how many base learners should be aggregated. This choice is driven by a two-objective function that maximizes, on a validation set, the accuracy and the diversity of the ensemble itself. A wide set of experiments on several publicly available datasets, accounting for more than 92,000 images, shows that the proposed approach provides average recognition rates up to 93.54% when tested on external datasets."
  keywords: "COVID-19; medical imaging; clinical prediction"
  projects: "covid-prognosis-platform"
- key: "gravina2022evaluatingtumour"
  title: "Evaluating Tumour Bounding Options for Deep Learning-based Axillary Lymph Node Metastasis Prediction in Breast Cancer"
  author: "Michela Gravina and Ermanno Cordelli and Domiziana Santucci and Paolo Soda and Carlo Sansone"
  venue: "2022 26th International Conference on Pattern Recognition (ICPR)"
  year: "2022"
  doi: "10.1109/icpr56361.2022.9956657"
  doi_url: "https://doi.org/10.1109/icpr56361.2022.9956657"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/icpr56361.2022.9956657"
  url: "https://doi.org/10.1109/icpr56361.2022.9956657"
  abstract: "The involvement of axillary lymph node metastasis in breast cancer is one of the most important independent prognostic factors. While the metastasis of lymph node depends on primary tumour intrinsic behaviour, morphology and angioinvasivity, the involvement of the peritumoral tissue by the neoplastic cells also provides useful information for the potential tumour aggressiveness. The lymph node status is currently evaluated by histological invasive procedures with possible complications, asking for introducing safer approaches. Among different imaging techniques, the Dynamic Contrast Enhanced-Magnetic Resonance Imaging (DCE-MRI) highlights physiological and morphological characteristics, reflecting breast lesions behaviour and aggressiveness. In the recent years, deep learning (DL) approaches, such as Convolutional Neural Networks, gained increasing popularity for biomedical image processing. Thanks to their ability to autonomously learn from images the set of features for the specific task to solve, they allow finding non-invasive alternatives to the standard procedures used up to now. This paper aims to evaluate the applicability of DL approaches for the axillary lymph node metastasis prediction, considering primary tumour DCE-MRI sequence. Differently from other work in the literature, we include a detailed analysis of healthy tissue influence in lymph node tumour spread through the evaluation of different tumour bounding options. Promising results are reported on a dataset of 153 patients with 155 malignant lesions."
  keywords: "radiomics; oncology; clinical prediction"
  projects: ""
- key: "faiella2022quantibprostate"
  title: "Quantib Prostate Compared to an Expert Radiologist for the Diagnosis of Prostate Cancer on mpMRI: A Single-Center Preliminary Study"
  author: "Eliodoro Faiella and Daniele Vertulli and Francesco Esperto and Ermanno Cordelli and Paolo Soda and Rosa Maria Muraca and Lorenzo Paolo Moramarco and Rosario Francesco Grasso and Bruno Beomonte Zobel and Domiziana Santucci"
  venue: "Tomography"
  year: "2022"
  doi: "10.3390/tomography8040168"
  doi_url: "https://doi.org/10.3390/tomography8040168"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3390/tomography8040168"
  abstract: "Background: To evaluate the clinical utility of an Artificial Intelligence (AI) radiology solution, Quantib Prostate, for prostate cancer (PCa) lesions detection on multiparametric Magnetic Resonance Images (mpMRI). Methods: Prostate mpMRI exams of 108 patients were retrospectively studied. The diagnostic performance of an expert radiologist (>8 years of experience) and of an inexperienced radiologist aided by Quantib software were compared. Three groups of patients were assessed: patients with positive mpMRI, positive target biopsy, and/or at least one positive random biopsy (group A, 73 patients); patients with positive mpMRI and a negative biopsy (group B, 14 patients), and patients with negative mpMRI who did not undergo biopsy (group-C, 21 patients). Results: In group A, the AI-assisted radiologist found new lesions with positive biopsy correlation, increasing the diagnostic PCa performance when compared with the expert radiologist, reaching an SE of 92.3% and a PPV of 90.1% (vs. 71.7% and 84.4%). In group A, the expert radiologist found 96 lesions on 73 mpMRI exams (17.7% PIRADS3, 56.3% PIRADS4, and 26% PIRADS5). The AI-assisted radiologist found 121 lesions (0.8% PIRADS3, 53.7% PIRADS4, and 45.5% PIRADS5). At biopsy, 33.9% of the lesions were ISUP1, 31.4% were ISUP2, 22% were ISUP3, 10.2% were ISUP4, and 2.5% were ISUP5. In group B, where biopsies were negative, the AI-assisted radiologist excluded three lesions but confirmed all the others. In group-C, the AI-assisted radiologist found 37 new lesions, most of them PIRADS 3, with 32.4% localized in the peripherical zone and 67.6% in the transition zone. Conclusions: Quantib software is a very sensitive tool to use specifically in high-risk patients (high PIRADS and high Gleason score)."
  keywords: "radiomics; oncology; clinical prediction"
  projects: ""
- key: "faiella2022artificialintelligence"
  title: "Artificial Intelligence in Bone Metastases: An MRI and CT Imaging Review"
  author: "Eliodoro Faiella and Domiziana Santucci and Alessandro Calabrese and Fabrizio Russo and Gianluca Vadalà and Bruno Beomonte Zobel and Paolo Soda and Giulio Iannello and Carlo de Felice and Vincenzo Denaro"
  venue: "International Journal of Environmental Research and Public Health"
