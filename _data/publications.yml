- key: "avanzo2026robustradiomics"
  title: "Robust radiomics: a review of guidelines for radiomics in medical imaging"
  author: "Michele Avanzo and Paolo Soda and Marco Bertolini and Andrea Bettinelli and Tiziana Rancati and Joseph Stancanello and Osvaldo Rampado and Giovanni Pirrone and Annalisa Drigo"
  venue: "Frontiers in Radiology"
  year: "2026"
  doi: "10.3389/fradi.2025.1701110"
  doi_url: "https://doi.org/10.3389/fradi.2025.1701110"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.3389/fradi.2025.1701110"
  abstract: "Introduction Radiomics aims to develop image-based biomarkers by combining quantitative analysis of medical images with artificial intelligence (AI) through a robust, reproducible pipeline. Scientific societies, task groups, and consortia have published several guidelines to help researchers design robust radiomics studies. This review summarizes existing guidelines, recommendations, and regulations for designing radiomics studies that can lead to clinically adoptable biomarkers. Methods Relevant articles were identified through a PubMed systematic review using “radiomics” and “guideline” as keywords. Of 314 retrieved papers, after screening 99 articles were deemed relevant for extracting recommendations on developing image-based biomarkers. Additional guidelines were searched by the authors. Results We can synthesize the systematic review in the following high consensus recommendations divided into five major areas: a) Study Design: Carefully define the study rationale, objectives, and outcomes, ensuring the dataset is of adequate size and quality; b) Data Workflow: Use standardized protocols for image acquisition, reconstruction, preprocessing, and feature extraction—following IBSI guidelines where applicable; c) Model Development and Validation: Follow best practices for model development, including prevention of data leakage, dimensionality reduction, strategies to enhance model interpretability, and establish biological plausibility; d) Transparency and Reproducibility: Publish results with sufficient methodological details to ensure rigor and generalizability and promote open science by sharing codes and data; e) Quality and compliance: Evaluate study compliance with relevant guidelines and regulations using appropriate quality metrics. Conclusion Radiomics promises to offer clinically useful imaging biomarkers and can represent a significant step in personalized medicine. In the present systematic review we identified five key guidelines and regulations developed in recent years, specifically for radiomics or AI, that can guide the research community in designing and conducting radiomic studies that result in an imaging biomarker suitable for clinical practice."
  keywords: "radiomics; multimodal learning; medical imaging"
  projects: ""
- key: "wu2025acgmattribute"
  title: "ACGM: Attribute-Centric Graph Modeling Network for Concurrent Missing Tabular Data Imputation and COVID-19 Prognosis"
  author: "Zhuoru Wu and Wenting Chen and Li Xu and Filippo Ruffini and Shaonan Liu and Lorenzo Tronchin and Domenico Albano and Eliodoro Faiella and Deborah Fazzini and Domiziana Santucci and Xiaoling Luo and Valerio Guarrasi and Paolo Soda and Linlin Shen"
  venue: "IEEE Journal of Biomedical and Health Informatics"
  year: "2025"
  doi: "10.1109/jbhi.2025.3618935"
  doi_url: "https://doi.org/10.1109/jbhi.2025.3618935"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/jbhi.2025.3618935"
  url: "https://doi.org/10.1109/jbhi.2025.3618935"
  abstract: "COVID-19 prognosis using clinical tabular data faces significant challenges due to missing values and class imbalance issues. Existing methods often overlook the complex high-order interrelationship among clinical attributes and struggle with training stability on imbalanced datasets. We propose ACGM, an attribute-centric graph modeling network that simultaneously addresses missing data imputation and COVID-19 prognosis. ACGM consists of three key modules: an attributes preprocessing module (APM) for coarse-grained imputation initialization, a graph-enhanced attributes imputation module (GEAIM) that models high-order inter-attribute relationships through graph structures, and a graph-enhanced disease prognosis module (GEDPM) that leverages these complex attribute interactions for final prediction. GEAIM and GEDPM employ a mean-teacher strategy with attributes graph matching to preserve high-order relationships, enhance training stability, and maintain structural integrity of attribute interactions. Extensive experiments are conducted on four public COVID-19 tabular datasets, demonstrating the superiority of our ACGM over existing methods. Through comprehensive interpretability analysis, we identify that attributes such as LDH, Difficulty In Breathing, and SaO2 significantly impact COVID-19 prognosis, aligning well with clinical insights and radiologist assessments."
  keywords: "oncology; COVID-19; explainability"
  projects: ""
- key: "tronchin2025latentaugmentdata"
  title: "LatentAugment: Data Augmentation via Guided Manipulation of GAN's Latent Space"
  author: "Lorenzo Tronchin and Minh H. Vu and Paolo Soda and Tommy Lofstedt"
  venue: "IEEE Transactions on Pattern Analysis and Machine Intelligence"
  year: "2025"
  doi: "10.1109/TPAMI.2025.3598866"
  doi_url: "https://doi.org/10.1109/TPAMI.2025.3598866"
  pdf: ""
  code: "https://github.com/ltronchin/LatentAugment"
  website: ""
  url: "https://doi.org/10.1109/TPAMI.2025.3598866"
  abstract: "Data Augmentation (DA) is a technique to increase the quantity and diversity of the training data, and by that alleviate overfitting and improve generalisation. However, standard DA produces synthetic data for augmentation with limited diversity. Generative Adversarial Networks (GANs) may unlock additional information in a dataset by generating synthetic samples having the appearance of real images. However, these models struggle to simultaneously address three key requirements: fidelity and high-quality samples; diversity and mode coverage; and fast sampling. Indeed, GANs generate high-quality samples rapidly, but have poor mode coverage, limiting their adoption in DA applications. We propose LatentAugment, a DA strategy that overcomes the low diversity of GANs, opening up for use in DA applications. Without external supervision, LatentAugment modifies latent vectors and moves them into latent space regions to maximise the synthetic images' diversity and fidelity. It is also agnostic to the dataset and the downstream task. A wide set of experiments shows that LatentAugment improves the generalisation of a deep model translating from MRI-to-CT beating both standard DA as well GAN-based sampling. We further demonstrate its effectiveness when translating from low-energy mammograms to dual-energy subtracted images in contrast-enhanced spectral mammography. Moreover, still in comparison with GAN-based sampling, LatentAugment synthetic samples show superior mode coverage and diversity."
  keywords: "generative AI; multimodal learning"
  projects: ""
- key: "teodoro2025agraph"
  title: "A graph neural network-based model with out-of-distribution robustness for enhancing antiretroviral therapy outcome prediction for HIV-1"
  author: "Giulia Di Teodoro and Federico Siciliano and Valerio Guarrasi and Anne-Mieke Vandamme and Valeria Ghisetti and Anders Sonnerborg and Maurizio Zazzi and Fabrizio Silvestri and Laura Palagi"
  venue: "Computerized Medical Imaging and Graphics"
  year: "2025"
  doi: "10.1016/j.compmedimag.2024.102484"
  doi_url: "https://doi.org/10.1016/j.compmedimag.2024.102484"
  pdf: ""
  code: "https://github.com/federicosiciliano/graph-ood-hiv"
  website: ""
  url: "https://doi.org/10.1016/j.compmedimag.2024.102484"
  abstract: "Predicting the outcome of antiretroviral therapies (ART) for HIV-1 is a pressing clinical challenge, especially when the ART includes drugs with limited effectiveness data. This scarcity of data can arise either due to the introduction of a new drug to the market or due to limited use in clinical settings, resulting in clinical dataset with highly unbalanced therapy representation. To tackle this issue, we introduce a novel joint fusion model, which combines features from a Fully Connected (FC) Neural Network and a Graph Neural Network (GNN) in a multi-modality fashion. Our model uses both tabular data about genetic sequences and a knowledge base derived from Stanford drug-resistance mutation tables, which serve as benchmark references for deducing in-vivo treatment efficacy based on the viral genetic sequence. By leveraging this knowledge base structured as a graph, the GNN component enables our model to adapt to imbalanced data distributions and account for Out-of-Distribution (OoD) drugs. We evaluated these models' robustness against OoD drugs in the test set. Our comprehensive analysis demonstrates that the proposed model consistently outperforms the FC model. These results underscore the advantage of integrating Stanford scores in the model, thereby enhancing its generalizability and robustness, but also extending its utility in contributing in more informed clinical decisions with limited data availability. The source code is available at https://github.com/federicosiciliano/graph-ood-hiv."
  keywords: "clinical prediction; explainability"
  projects: "clinical-risk-stratification"
- key: "salm2025evaluatingvision"
  title: "Evaluating Vision Language Model Adaptations for Radiology Report Generation in Low-Resource Languages"
  author: "Marco Salmè and Rosa Sicilia and Paolo Soda and Valerio Guarrasi"
  venue: "2025 International Joint Conference on Neural Networks (IJCNN)"
  year: "2025"
  doi: "10.1109/IJCNN64981.2025.11227552"
  doi_url: "https://doi.org/10.1109/IJCNN64981.2025.11227552"
  pdf: ""
  code: ""
  website: ""
  url: "https://doi.org/10.1109/IJCNN64981.2025.11227552"
  abstract: "The integration of artificial intelligence in healthcare has opened new horizons for improving medical diagnostics and patient care. However, challenges persist in developing systems capable of generating accurate and contextually relevant radiology reports, particularly in low-resource languages. In this study, we present a comprehensive benchmark to evaluate the performance of instruction-tuned Vision-Language Models (VLMs) in the specialized task of radiology report generation across three low-resource languages: Italian, German, and Spanish. Employing the LLaVA architectural framework, we conducted a systematic evaluation of pre-trained models utilizing general datasets, domain-specific datasets, and low-resource language-specific datasets. In light of the unavailability of models that possess prior knowledge of both the medical domain and low-resource languages, we analyzed various adaptations to determine the most effective approach for these contexts. The results revealed that language-specific models substantially outperformed both general and domain-specific models in generating radiology reports, emphasizing the critical role of linguistic adaptation. Additionally, models fine-tuned with medical terminology exhibited enhanced performance across all languages compared to models with generic knowledge, highlighting the importance of domain-specific training. We also explored the influence of the temperature parameter on the coherence of report generation, providing insights for optimal model settings. Our findings highlight the importance of tailored language and domain-specific training for improving the quality and accuracy of radiological reports in multilingual settings. This research not only advances our understanding of VLMs adaptability in healthcare but also points to significant avenues for future investigations into model tuning and language-specific adaptations."
  keywords: "foundation models; medical imaging"
  projects: ""
- key: "rofena2025lesionaware"
  title: "Lesion-Aware Generative Artificial Intelligence for Virtual Contrast-Enhanced Mammography in Breast Cancer"
  author: "Aurora Rofena and Arianna Manchia and Claudia Lucia Piccolo and Bruno Beomonte Zobel and Paolo Soda and Valerio Guarrasi"
  venue: "2025 IEEE 38th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2025"
  doi: "10.1109/cbms65348.2025.00039"
  doi_url: "https://doi.org/10.1109/cbms65348.2025.00039"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/cbms65348.2025.00039"
  url: "https://doi.org/10.1109/cbms65348.2025.00039"
  abstract: "Contrast-Enhanced Spectral Mammography (CESM) is a dual-energy mammographic technique that improves lesion visibility through the administration of an iodinated contrast agent. It acquires both a low-energy image, comparable to standard mammography, and a high-energy image, which are then combined to produce a dual-energy subtracted image highlighting lesion contrast enhancement. While CESM offers superior diagnostic accuracy compared to standard mammography, its use entails higher radiation exposure and potential side effects associated with the contrast medium. To address these limitations, we propose Seg-CycleGAN, a generative deep learning framework for Virtual Contrast Enhancement in CESM. The model synthesizes high-fidelity dual-energy subtracted images from low-energy images, leveraging lesion segmentation maps to guide the generative process and improve lesion reconstruction. Building upon the standard CycleGAN architecture, Seg-CycleGAN introduces localized loss terms focused on lesion areas, enhancing the synthesis of diagnostically relevant regions. Experiments on the CESM@UCBM dataset demonstrate that Seg-CycleGAN outperforms the baseline in terms of PSNR and SSIM, while maintaining competitive MSE and VIF. Qualitative evaluations further confirm improved lesion fidelity in the generated images. These results suggest that segmentation-aware generative models offer a viable pathway toward contrast-free CESM alternatives."
  keywords: "radiomics; oncology; generative AI"
  projects: ""
- key: "pede2025aipowered"
  title: "AI-Powered Insulin Pens for Pediatric Diabetes: Advancements in Lipodystrophy Detection and Injection Site Recognition"
  author: "Lorenzo Pede and Mariangela Martino and Maria Elisa Amodeo and Francesca Silvestri and Sebastiano Battista Romano Viglialoro and Daria Maggi and Dario Tuccinardi and Vincenzo Piemonte and Silvia Manfrini and Riccardo Schiaffini and Paolo Soda and Ermanno Cordelli"
  venue: "2025 IEEE 38th International Symposium on Computer-Based Medical Systems (CBMS)"
  year: "2025"
  doi: "10.1109/cbms65348.2025.00153"
  doi_url: "https://doi.org/10.1109/cbms65348.2025.00153"
  pdf: ""
  code: ""
  website: "https://doi.org/10.1109/cbms65348.2025.00153"
  url: "https://doi.org/10.1109/cbms65348.2025.00153"
  abstract: "Effective management of pediatric diabetes remains a clinical challenge, particularly due to the onset of lipodystrophy resulting from repeated insulin injections and inadequate rotation of injection sites. These complications adversely affect subcutaneous tissue integrity and insulin pharmacokinetics, ultimately compromising glycemic control. In this study, we introduce diPen, a novel smart case designed to integrate with commercial insulin pens and equipped with a dual-sensor system: an optical module for non-invasive lipodystrophy detection and an inertial measurement unit for monitoring injection-site rotation. To evaluate the feasibility of the proposed approach, a clinical study was conducted involving a pediatric cohort. The system employs a personalized machine learning pipeline, leveraging a leave-one-acquisition-out validation strategy to replicate realworld deployment scenarios, wherein newly acquired data from the same subject are evaluated without prior exposure during training. The system demonstrated promising performance in both detection and classification tasks, suggesting that di-Pen may represent a viable tool for enhancing insulin therapy through personalized, data-driven injection guidance and tissue health monitoring."
  keywords: "medical imaging"
